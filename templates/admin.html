<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>Admin Panel - Student Messages</h1>

<table border="1" width="100%">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Message</th>

</tr>

{% for row in data %}

<tr>

<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
